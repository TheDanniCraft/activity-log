name: Update Major Version Tag

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-major-tag:
    # Only move major tags for stable semver releases like v1.2.3.
    if: ${{ github.event.release.prerelease == false && startsWith(github.event.release.tag_name, 'v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Move major version tag
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v([0-9]+)\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag '$RELEASE_TAG' is not stable semver (vX.Y.Z). Skipping."
            exit 0
          fi

          MAJOR_TAG="v${BASH_REMATCH[1]}"

          git fetch --tags --force
          HIGHEST_STABLE_TAG="$(
            git tag -l "${MAJOR_TAG}.*.*" \
              | grep -E "^${MAJOR_TAG}\.[0-9]+\.[0-9]+$" \
              | sort -V \
              | tail -n 1 \
              || true
          )"

          if [[ -z "$HIGHEST_STABLE_TAG" ]]; then
            echo "No stable tags found for $MAJOR_TAG. Skipping."
            exit 0
          fi

          if [[ "$RELEASE_TAG" != "$HIGHEST_STABLE_TAG" ]]; then
            echo "Published tag $RELEASE_TAG is not the highest stable $MAJOR_TAG release ($HIGHEST_STABLE_TAG). Skipping."
            exit 0
          fi

          RELEASE_SHA="$(git rev-list -n 1 "$RELEASE_TAG")"
          git tag -f "$MAJOR_TAG" "$RELEASE_SHA"
          git push origin "refs/tags/$MAJOR_TAG" --force

          echo "Moved $MAJOR_TAG to $RELEASE_TAG ($RELEASE_SHA)."
