name: PR Quality

permissions:
    contents: read
    issues: read
    pull-requests: write

on:
    pull_request_target:
        types: [opened, reopened]

jobs:
    pr-quality:
        runs-on: ubuntu-latest
        steps:
            - uses: peakoss/anti-slop@v0
              with:
                  # General Settings
                  max-failures: 3

                  # PR Branch Checks
                  allowed-target-branches: "master"
                  blocked-target-branches: ""
                  allowed-source-branches: ""
                  blocked-source-branches: ""

                  # PR Quality Checks
                  max-negative-reactions: 0
                  require-maintainer-can-modify: true

                  # PR Title Checks
                  require-conventional-title: true

                  # PR Description Checks
                  require-description: true
                  max-description-length: 2500
                  max-emoji-count: 3
                  max-code-references: 5
                  require-linked-issue: true
                  blocked-terms: "PINEAPPLE"
                  blocked-issue-numbers: ""

                  # PR Template Checks
                  require-pr-template: true
                  strict-pr-template-sections: "📝 Description,🧩 Type of Change,📋 Checklist,🤖 AI Usage"
                  optional-pr-template-sections: "💬 Other Information"
                  max-additional-pr-template-sections: 1

                  # Commit Message Checks
                  max-commit-message-length: 500
                  require-conventional-commits: true
                  require-commit-author-match: true
                  blocked-commit-authors: ""

                  # File Checks
                  allowed-file-extensions: ""
                  allowed-paths: ""
                  blocked-paths: |
                      LICENSE
                      CODE_OF_CONDUCT.md
                      CONTRIBUTING.md
                      SECURITY.md
                      SUPPORT.md
                      AGENTS.md
                      .github/PULL_REQUEST_TEMPLATE.md
                      .github/ISSUE_TEMPLATE/
                  require-final-newline: true
                  max-added-comments: 15

                  # User Checks
                  detect-spam-usernames: true
                  min-account-age: 30
                  max-daily-forks: 3
                  min-profile-completeness: 4

                  # Merge Checks
                  min-repo-merged-prs: 5
                  min-repo-merge-ratio: 60
                  min-global-merge-ratio: 60
                  global-merge-ratio-exclude-own: true

                  # Exemptions
                  exempt-draft-prs: false
                  exempt-bots: |
                      renovate[bot]
                      dependabot[bot]
                      github-actions[bot]
                  exempt-users: ""
                  exempt-author-association: "OWNER,MEMBER,COLLABORATOR"
                  exempt-label: "quality/exempt"
                  exempt-pr-label: "quality/exempt"
                  exempt-all-milestones: false
                  exempt-all-pr-milestones: false
                  exempt-milestones: ""
                  exempt-pr-milestones: ""

                  # PR Success Actions
                  success-add-pr-labels: "quality/verified"

                  # PR Failure Actions
                  failure-remove-pr-labels: "quality/verified"
                  failure-remove-all-pr-labels: false
                  failure-add-pr-labels: "quality/rejected"
                  failure-pr-message: "⚠️ This PR was automatically closed because it did not pass our quality requirements. Please update the PR and reopen it when it is ready for review."
                  close-pr: true
                  lock-pr: false

